# your_md_project/Cargo.toml
[workspace]
members = [ "md_core",
    "md_sim",
    "md_viz",
]
resolver = "2"

[workspace.dependencies]
rand = "0.8"
three-d = { version = "0.18.2", features = ["headless"] }
glam = "0.27"
image = "0.24"
winit = "0.28"
serde = { version = "1.0", features = ["derive"] } 
serde_json = "1.0"
polars = { version = "0.38"} 



